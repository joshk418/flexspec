      definition: A .flexspec/brainstorms/<slug>.md file capturing an in-depth pre-spec interview (problem, edge cases, security, performance, alternatives, open questions) for a feature idea; created via flexspec brainstorm new and authored by /flexspec-brainstorm. No status lifecycle; not returned by flexspec list or the UI board.
      category: workflow
